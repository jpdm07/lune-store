# Builds the Vite production bundle and publishes the `dist/` folder to the `gh-pages` branch.
# Result: https://jpdm07.github.io/lune-store/ (configure Pages to serve from `gh-pages` / root).

name: GitHub Pages — LUNE storefront

on:
  push:
    branches: [main]
  workflow_dispatch:

# Surface the triggering commit subject on push so Actions history reads like real work, not a generic deploy.
run-name: ${{ github.event_name == 'workflow_dispatch' && 'Deploy LUNE storefront (manual run)' || github.event.head_commit.message }}

permissions:
  contents: write

concurrency:
  group: gh-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build production site and publish to gh-pages
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site (Vite)
        run: npm run build

      - name: Publish to GitHub Pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
          full_commit_message: |
            gh-pages: production build from ${{ github.sha }}

            Source (main): ${{ github.event.head_commit.message || '—' }}

            Trigger: ${{ github.event_name }} by ${{ github.actor }} · ref ${{ github.ref_name }}
