# Builds the Vite production bundle and publishes the `dist/` folder to the `gh-pages` branch.
# Result: https://jpdm07.github.io/lune-store/ (configure Pages to serve from `gh-pages` / root).
#
# Deployments / gh-pages history: each publish commit should describe what shipped (mirror `main`'s
# commit message on push; explicit manual text on workflow_dispatch)—not one repeated generic title.

name: GitHub Pages — LUNE storefront

on:
  push:
    branches: [main]
  workflow_dispatch:

# Prefer the same subject line as the push to `main` so the Actions list matches your real work.
# (Keep commit subjects single-line when possible—multi-line subjects can look noisy here.)
run-name: ${{ github.event_name == 'workflow_dispatch' && format('LUNE Pages — manual deploy ({0})', github.sha) || github.event.head_commit.message }}

permissions:
  contents: write

concurrency:
  group: gh-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build production site and publish to gh-pages
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site (Vite)
        run: npm run build

      # GitHub Deployments / gh-pages branch: first line is what people skim—reuse the real app
      # commit message on push; on manual runs, say so clearly with actor + SHA.
      - name: Compose gh-pages commit message
        id: pages_commit
        env:
          HEAD_MESSAGE: ${{ github.event.head_commit.message }}
          EVENT_NAME: ${{ github.event_name }}
          SHA: ${{ github.sha }}
          REF_NAME: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail
          SHORT="${SHA:0:7}"
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            MSG="chore(pages): manual LUNE storefront deploy (${SHORT})

          workflow_dispatch by ${ACTOR}. Checkout SHA ${SHA} (${REF_NAME})."
          else
            MSG="${HEAD_MESSAGE}

          —
          gh-pages publish from ${REF_NAME} · ${SHA}"
          fi
          {
            echo "full<<PAGES_MSG_EOF"
            printf '%s\n' "$MSG"
            echo "PAGES_MSG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publish to GitHub Pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
          full_commit_message: ${{ steps.pages_commit.outputs.full }}
